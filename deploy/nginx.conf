# TicketScout — Nginx reverse proxy config
# Place at: /etc/nginx/sites-available/ticketscout
# Then: sudo ln -s /etc/nginx/sites-available/ticketscout /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain (e.g. scout.yourdomain.com)
# After running certbot, it will auto-edit the SSL section below.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL (filled in by certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (Nginx layer — Flask also sets these) ─────────────
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate limiting (defined in nginx.conf http block) ───────────────────
    # Add to /etc/nginx/nginx.conf inside http {}:
    #   limit_req_zone $binary_remote_addr zone=ticketscout_login:10m rate=5r/m;
    location /login {
        limit_req zone=ticketscout_login burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Main proxy ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;        # needed for SSE (live log stream)
        proxy_cache_bypass $http_upgrade;
    }

    # ── Block sensitive paths ──────────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(db|log|py|cfg|ini|sh|bat)$ {
        deny all;
        return 404;
    }

    # ── Upload size limit ──────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
